apiVersion: v1
kind: PersistentVolume
metadata:
  name: fraud-detection-pv
  labels:
    app: fraud-detection
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /data/fraud-detection
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fraud-detection-pvc
  namespace: fraud-detection
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
